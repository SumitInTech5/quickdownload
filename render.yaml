services:
  - type: web
    name: all-video-downloader-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: all-video-downloader-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://quickdownload.lovable.app,http://localhost:8080
      - key: PUBLIC_BASE_URL
        value: https://all-video-downloader-backend.onrender.com
      - key: MEDIA_ROOT
        value: /tmp/ytdlp-media