services:
  - type: web
    name: yt-dlp-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: API_KEY
        generateValue: true   # Render generates a random secret; copy it to YTDLP_SERVICE_API_KEY in Lovable
